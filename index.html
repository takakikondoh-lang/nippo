<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務日報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1814;--ink-mid:#5a5650;--ink-light:#9a9590;--ink-faint:#e2ddd8;
  --paper:#f7f4ef;--paper-warm:#efe9e0;--paper-card:#faf8f5;
  --accent:#8b6f47;--accent-light:#c4a882;--accent-faint:#f0e8dc;
  --rule:rgba(26,24,20,.07);
  --serif:'Noto Serif JP',serif;
  --sans:'Noto Sans JP',sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --r:4px;--hh:52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--serif);background:var(--paper);color:var(--ink);display:flex;flex-direction:column;font-size:15px}

/* HEADER */
header{height:var(--hh);flex-shrink:0;border-bottom:1px solid var(--rule);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;background:var(--paper-card);z-index:10}
.logo{font-family:var(--mono);font-size:.8rem;letter-spacing:.18em;color:var(--ink-mid);text-transform:uppercase}
.logo span{color:var(--accent)}
.header-tabs{display:flex}
.htab{font-family:var(--mono);font-size:.78rem;letter-spacing:.08em;padding:0 16px;height:var(--hh);display:flex;align-items:center;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--ink-light);margin-bottom:-1px;transition:color .15s}
.htab:hover{color:var(--ink)}
.htab.active{color:var(--ink);border-bottom-color:var(--accent)}
#hdate{font-family:var(--mono);font-size:.75rem;letter-spacing:.08em;color:var(--ink-light)}

/* SHELL — 4カラム */
.shell{flex:1;display:grid;grid-template-columns:210px 1fr 440px 200px;min-height:0;overflow:hidden}
.col{overflow:hidden;display:flex;flex-direction:column}
.col-left{border-right:1px solid var(--rule);background:var(--paper-card)}
.col-rpreview{border-left:1px solid var(--rule);background:var(--paper-card)}
.col-rinfo{border-left:1px solid var(--rule);background:var(--paper-card)}

/* SCROLL */
.col-inner{flex:1;overflow-y:auto;padding:1.25rem 1.1rem}
.col-inner::-webkit-scrollbar{width:4px}
.col-inner::-webkit-scrollbar-thumb{background:var(--ink-faint);border-radius:2px}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.cal-nav button{background:none;border:none;cursor:pointer;color:var(--ink-light);font-size:1.1rem;padding:2px 6px;font-family:var(--mono)}
.cal-nav button:hover{color:var(--ink)}
.cal-ym{font-family:var(--mono);font-size:.82rem;letter-spacing:.1em;color:var(--ink-mid)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-family:var(--mono);font-size:.7rem;text-align:center;color:var(--ink-light);padding:4px 0}
.cal-day{font-family:var(--mono);font-size:.78rem;text-align:center;padding:6px 2px;border-radius:4px;cursor:pointer;color:var(--ink-light);position:relative;line-height:1.2}
.cal-day:hover{background:var(--accent-faint);color:var(--ink)}
.cal-day.other{color:var(--ink-faint);pointer-events:none}
.cal-day.has{color:var(--ink);font-weight:500}
.cal-day.has::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--accent);margin:2px auto 0}
.cal-day.today{outline:1.5px solid var(--accent-light);outline-offset:-1px}
.cal-day.sel{background:var(--accent)!important;color:#fff!important}
.cal-day.sel::after{background:rgba(255,255,255,.7)}
.cal-divider{border:none;border-top:1px solid var(--rule);margin:1.1rem 0 .8rem}
.cal-legend{font-family:var(--mono);font-size:.7rem;color:var(--ink-light)}

/* WRITE VIEW */
.write-panel{display:flex;flex-direction:column;height:100%}
.write-header{flex-shrink:0;padding:1rem 1.75rem .8rem;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;gap:12px}
.date-heading{display:flex;align-items:center;gap:10px}
.date-heading::before{content:'';display:block;width:4px;height:22px;background:var(--accent);border-radius:2px;flex-shrink:0}
.date-main{font-family:var(--serif);font-size:1.25rem;font-weight:500;color:var(--ink);letter-spacing:.04em;line-height:1}
.date-sub{font-family:var(--mono);font-size:.75rem;color:var(--ink-light);margin-top:3px}
.write-body{flex:1;display:flex;flex-direction:column;min-height:0}
.write-body textarea{flex:1;width:100%;resize:none;padding:1.4rem 2rem;font-family:var(--sans);font-size:1rem;line-height:2;color:var(--ink);background:transparent;border:none;outline:none}
.write-body textarea::placeholder{color:var(--ink-light)}
.write-footer{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.75rem;border-top:1px solid var(--rule)}
.char-count{font-family:var(--mono);font-size:.73rem;color:var(--ink-light)}
.unsaved-badge{font-family:var(--mono);font-size:.7rem;color:var(--accent);opacity:0;transition:opacity .2s}
.unsaved-badge.show{opacity:1}
.ai-box{flex-shrink:0;background:var(--accent-faint);border-top:1px solid var(--accent-light);padding:1rem 2rem;font-size:.93rem;line-height:1.85;color:var(--ink);display:none;max-height:200px;overflow-y:auto}
.ai-box-label{font-family:var(--mono);font-size:.68rem;letter-spacing:.1em;color:var(--accent);margin-bottom:.5rem}

/* LIST VIEW */
.list-panel{display:flex;flex-direction:column;height:100%}
.list-search{flex-shrink:0;padding:1rem 1.75rem .85rem;border-bottom:1px solid var(--rule);position:relative}
.list-search input{width:100%;padding:8px 12px 8px 32px;font-family:var(--sans);font-size:.93rem;background:var(--paper);border:1px solid var(--ink-faint);border-radius:var(--r);color:var(--ink);outline:none}
.list-search input:focus{border-color:var(--accent-light)}
.list-search input::placeholder{color:var(--ink-light)}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--ink-light);font-size:.9rem;font-family:var(--mono);pointer-events:none}
.list-body{flex:1;overflow-y:auto;padding:0 1.75rem}
.list-body::-webkit-scrollbar{width:4px}
.list-body::-webkit-scrollbar-thumb{background:var(--ink-faint);border-radius:2px}
.log-item{border-bottom:1px solid var(--rule);padding:1.1rem 0}
.log-item:last-child{border-bottom:none}
.log-date-badge{font-family:var(--mono);font-size:.78rem;letter-spacing:.06em;color:var(--accent);margin-bottom:.45rem;font-weight:500}
.log-body{font-size:.93rem;line-height:1.85;color:var(--ink);white-space:pre-wrap;word-break:break-word;font-family:var(--sans)}
.log-body a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
.expand-btn{font-family:var(--mono);font-size:.7rem;color:var(--ink-light);background:none;border:none;cursor:pointer;padding:3px 0;letter-spacing:.05em;display:block;margin-top:4px}
.expand-btn:hover{color:var(--accent)}

/* URL CARD */
.url-card{display:flex;gap:10px;border:1px solid var(--ink-faint);border-radius:var(--r);padding:9px 11px;margin:7px 0;background:var(--paper-card);cursor:pointer;overflow:hidden;transition:border-color .15s}
.url-card:hover{border-color:var(--accent-light)}
.url-card-thumb{width:48px;height:48px;border-radius:3px;object-fit:cover;flex-shrink:0;background:var(--paper-warm)}
.url-card-info{overflow:hidden;flex:1;min-width:0}
.url-card-title{font-size:.83rem;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.url-card-desc{font-size:.75rem;color:var(--ink-mid);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.45}
.url-card-domain{font-family:var(--mono);font-size:.67rem;color:var(--ink-light);margin-top:4px}
.highlight{background:var(--accent-faint);border-radius:2px;padding:0 2px}

/* STATS VIEW */
.stats-panel{display:flex;flex-direction:column;height:100%}
.stats-body{flex:1;overflow-y:auto;padding:1.4rem 1.75rem}
.stats-body::-webkit-scrollbar{width:4px}
.stats-body::-webkit-scrollbar-thumb{background:var(--ink-faint);border-radius:2px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat-card{background:var(--paper-card);border:1px solid var(--ink-faint);border-radius:var(--r);padding:.9rem .5rem;text-align:center}
.stat-num{font-family:var(--mono);font-size:1.75rem;font-weight:500;color:var(--accent)}
.stat-lbl{font-family:var(--mono);font-size:.65rem;letter-spacing:.06em;color:var(--ink-light);margin-top:3px}
.sbox{background:var(--paper-card);border:1px solid var(--ink-faint);border-radius:var(--r);padding:1.1rem 1.25rem;margin-bottom:1.35rem}
.box-label{font-family:var(--mono);font-size:.68rem;letter-spacing:.1em;color:var(--ink-light);margin-bottom:.7rem}
#stats-ai{font-size:.9rem;line-height:1.85;color:var(--ink-mid);white-space:pre-wrap;font-family:var(--sans)}
.export-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:.6rem}
.export-row select{font-family:var(--mono);font-size:.75rem;padding:6px 10px;background:var(--paper);border:1px solid var(--ink-faint);border-radius:var(--r);color:var(--ink);outline:none;cursor:pointer}
.export-row select:focus{border-color:var(--accent-light)}

/* RIGHT PREVIEW PANE */
.right-pane{display:flex;flex-direction:column;height:100%}
.right-nav{flex-shrink:0;padding:.65rem 1rem;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between}
.rnav-btn{font-family:var(--mono);font-size:1.1rem;background:none;border:none;cursor:pointer;color:var(--ink-light);padding:3px 9px;border-radius:3px;transition:all .15s;line-height:1}
.rnav-btn:hover{background:var(--accent-faint);color:var(--accent)}
.rnav-label{font-family:var(--mono);font-size:.7rem;letter-spacing:.05em;color:var(--ink-light)}
.right-slots{flex:1;overflow:hidden;display:flex;flex-direction:column}
.rslot{flex:1;overflow-y:auto;padding:1rem 1.1rem;display:flex;flex-direction:column;min-height:0}
.rslot:first-child{border-bottom:1px solid var(--rule)}
.rslot::-webkit-scrollbar{width:3px}
.rslot::-webkit-scrollbar-thumb{background:var(--ink-faint)}
.rslot-date{font-family:var(--mono);font-size:.72rem;letter-spacing:.06em;color:var(--accent);margin-bottom:.55rem;flex-shrink:0;font-weight:500}
.rslot-body{font-size:.88rem;line-height:1.8;color:var(--ink);white-space:pre-wrap;word-break:break-word;flex:1;font-family:var(--sans)}
.rslot-body.empty{color:var(--ink-faint);font-style:italic;font-family:var(--serif)}
.rslot-body a{color:var(--accent);text-decoration:underline}
.rslot-edit{flex-shrink:0;margin-top:.5rem}
.rslot-edit button{font-family:var(--mono);font-size:.68rem;color:var(--ink-light);background:none;border:none;cursor:pointer;letter-spacing:.05em}
.rslot-edit button:hover{color:var(--accent)}

/* RIGHT INFO PANE */
.info-pane{display:flex;flex-direction:column;height:100%}
.info-header{flex-shrink:0;padding:.75rem 1rem .6rem;border-bottom:1px solid var(--rule)}
.info-date-lbl{font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;color:var(--accent);font-weight:500}
.info-body{flex:1;overflow-y:auto;padding:1rem}
.info-body::-webkit-scrollbar{width:3px}
.info-body::-webkit-scrollbar-thumb{background:var(--ink-faint);border-radius:2px}
.info-section-label{font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;color:var(--ink-light);border-bottom:1px solid var(--rule);padding-bottom:.35rem;margin-bottom:.75rem}
.koyomi-grid{display:flex;flex-direction:column;gap:10px}
.koyomi-item{display:flex;flex-direction:column;gap:2px;padding-bottom:10px;border-bottom:1px solid var(--rule)}
.koyomi-item:last-child{border-bottom:none;padding-bottom:0}
.koyomi-key{font-family:var(--mono);font-size:.65rem;color:var(--ink-light);letter-spacing:.06em}
.koyomi-val{font-size:1rem;color:var(--ink);font-weight:500}
.koyomi-val.big{font-size:1.3rem}

/* BUTTONS */
.btn{font-family:var(--mono);font-size:.75rem;letter-spacing:.07em;padding:7px 15px;border-radius:var(--r);cursor:pointer;border:1px solid var(--ink-faint);background:var(--paper-card);color:var(--ink-mid);transition:all .15s}
.btn:hover{border-color:var(--ink-mid);color:var(--ink)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#7a5f38;border-color:#7a5f38}
.btn-row{display:flex;gap:8px}

/* MISC */
.empty{text-align:center;font-family:var(--mono);font-size:.75rem;letter-spacing:.08em;color:var(--ink-light);padding:3rem 0}
.spinner{display:inline-block;width:12px;height:12px;border:1.5px solid var(--ink-faint);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}

/* UNSAVED DIALOG */
.dialog-overlay{position:fixed;inset:0;background:rgba(26,24,20,.35);display:flex;align-items:center;justify-content:center;z-index:200;display:none}
.dialog-overlay.show{display:flex}
.dialog{background:var(--paper-card);border:1px solid var(--ink-faint);border-radius:8px;padding:1.75rem 2rem;max-width:360px;width:90%;box-shadow:0 8px 32px rgba(26,24,20,.12)}
.dialog-title{font-family:var(--mono);font-size:.82rem;letter-spacing:.1em;color:var(--ink);margin-bottom:.8rem}
.dialog-msg{font-size:.93rem;line-height:1.75;color:var(--ink-mid);margin-bottom:1.35rem;font-family:var(--sans)}
.dialog-btns{display:flex;gap:8px;justify-content:flex-end}
</style>
</head>
<body>

<header>
  <div class="logo">日報 <span>//</span> NIPPO</div>
  <div class="header-tabs">
    <button class="htab active" onclick="requestView('write')">記録する</button>
    <button class="htab" onclick="requestView('list')">過去の日報</button>
    <button class="htab" onclick="requestView('stats')">ふりかえり</button>
  </div>
  <span id="hdate"></span>
</header>

<div class="shell">

  <!-- LEFT: カレンダー -->
  <div class="col col-left">
    <div class="col-inner">
      <div class="cal-nav">
        <button onclick="calPrev()">‹</button>
        <span class="cal-ym" id="cal-ym"></span>
        <button onclick="calNext()">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <hr class="cal-divider">
      <div class="cal-legend">● 記録あり</div>
    </div>
  </div>

  <!-- MID: メインビュー -->
  <div class="col" style="background:var(--paper)">

    <div id="vwrite" class="write-panel">
      <div class="write-header">
        <div class="date-heading">
          <div>
            <div class="date-main" id="write-heading-main"></div>
            <div class="date-sub" id="write-heading-sub"></div>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn" onclick="generateSummary()">AI 要約</button>
          <button class="btn primary" onclick="saveEntry()">保存</button>
        </div>
      </div>
      <div class="write-body">
        <textarea id="entry-text" placeholder="今日の作業・気づき・課題など自由に記述…&#10;URLを貼るとリンクカードになります。"></textarea>
        <div class="ai-box" id="ai-box">
          <div class="ai-box-label">AI SUMMARY</div>
          <div id="ai-text"></div>
        </div>
      </div>
      <div class="write-footer">
        <span class="unsaved-badge" id="unsaved-badge">● 未保存</span>
        <span class="char-count" id="char-count">0 文字</span>
      </div>
    </div>

    <div id="vlist" class="list-panel" style="display:none">
      <div class="list-search">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="キーワードで検索…" oninput="renderList()">
      </div>
      <div class="list-body" id="log-list"></div>
    </div>

    <div id="vstats" class="stats-panel" style="display:none">
      <div class="stats-body">
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-lbl">TOTAL</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-streak">0</div><div class="stat-lbl">STREAK</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-month">0</div><div class="stat-lbl">MONTH</div></div>
        </div>
        <div class="sbox">
          <div class="box-label">WEEKLY REVIEW — AI</div>
          <div id="stats-ai">日報を3件以上記録すると、AIが傾向・振り返りを生成します。</div>
          <div class="btn-row" style="margin-top:.9rem">
            <button class="btn" onclick="generateWeeklyReview()">週次振り返りを生成</button>
          </div>
        </div>
        <div class="sbox">
          <div class="box-label">EXPORT — MARKDOWN</div>
          <div class="export-row">
            <select id="export-year"></select>
            <select id="export-month"></select>
            <button class="btn primary" onclick="exportMarkdown()">ダウンロード</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- RIGHT PREVIEW: 前日・翌日 -->
  <div class="col col-rpreview">
    <div class="right-pane">
      <div class="right-nav">
        <button class="rnav-btn" onclick="shiftOffset(-1)">↑</button>
        <span class="rnav-label" id="rnav-label"></span>
        <button class="rnav-btn" onclick="shiftOffset(1)">↓</button>
      </div>
      <div class="right-slots">
        <div class="rslot" id="rslot0"></div>
        <div class="rslot" id="rslot1"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT INFO: 暦情報 -->
  <div class="col col-rinfo">
    <div class="info-pane">
      <div class="info-header">
        <div class="info-date-lbl" id="info-date-lbl"></div>
      </div>
      <div class="info-body">
        <div class="info-section-label">暦・六曜</div>
        <div class="koyomi-grid" id="koyomi-grid"></div>
      </div>
    </div>
  </div>

</div>

<!-- 未保存ダイアログ -->
<div class="dialog-overlay" id="dlg-overlay">
  <div class="dialog">
    <div class="dialog-title">未保存の内容があります</div>
    <div class="dialog-msg" id="dlg-msg">保存せずに移動しますか？<br>入力内容は失われます。</div>
    <div class="dialog-btns">
      <button class="btn" id="dlg-cancel">キャンセル</button>
      <button class="btn" id="dlg-discard" style="color:#c0392b;border-color:#e8b4b0">破棄して移動</button>
      <button class="btn primary" id="dlg-save">保存して移動</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────
let logs=[];
let calYear,calMonth,selectedDate;
let rOffset=0;
let isDirty=false;       // 未保存フラグ
let pendingAction=null;  // ダイアログ後に実行する関数

const _today=new Date();_today.setHours(0,0,0,0);
const todayStr=fmt(_today);

function fmt(d){return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`}
function p(n){return String(n).padStart(2,'0')}
function parseDt(s){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setHours(0,0,0,0);return dt}
function addDays(s,n){const d=parseDt(s);d.setDate(d.getDate()+n);return fmt(d)}
function dowStr(s){const[y,m,d]=s.split('-');return['日','月','火','水','木','金','土'][new Date(+y,+m-1,+d).getDay()]}
function diffLabel(n){if(n===0)return'選択日';if(n===-1)return'前日';if(n===1)return'翌日';return n<0?`${Math.abs(n)}日前`:`${n}日後`}

// ─── INIT ─────────────────────────────────
function init(){
  try{logs=JSON.parse(localStorage.getItem('nippo_v4')||'[]')}catch(e){logs=[]}
  calYear=_today.getFullYear();calMonth=_today.getMonth();selectedDate=todayStr;
  document.getElementById('hdate').textContent=todayStr;
  const ta=document.getElementById('entry-text');
  ta.addEventListener('input',()=>{updateCC();setDirty(true)});
  setupDialog();
  renderCal();updateHeading();loadEntry(selectedDate);
  renderRight();renderStats();populateExport();
  renderInfo(selectedDate);
}

// ─── DIRTY / DIALOG ──────────────────────
function setDirty(v){
  isDirty=v;
  document.getElementById('unsaved-badge').classList.toggle('show',v);
}

function guardDirty(action){
  if(!isDirty){action();return}
  pendingAction=action;
  document.getElementById('dlg-overlay').classList.add('show');
}

function setupDialog(){
  document.getElementById('dlg-cancel').onclick=()=>{
    pendingAction=null;
    document.getElementById('dlg-overlay').classList.remove('show');
  };
  document.getElementById('dlg-discard').onclick=()=>{
    setDirty(false);
    document.getElementById('dlg-overlay').classList.remove('show');
    if(pendingAction){pendingAction();pendingAction=null}
  };
  document.getElementById('dlg-save').onclick=()=>{
    const text=document.getElementById('entry-text').value.trim();
    if(text)_doSave();
    setDirty(false);
    document.getElementById('dlg-overlay').classList.remove('show');
    if(pendingAction){pendingAction();pendingAction=null}
  };
  // beforeunload
  window.addEventListener('beforeunload',e=>{
    if(isDirty){e.preventDefault();e.returnValue=''}
  });
}

// ─── CALENDAR ────────────────────────────
function renderCal(){
  const yr=calYear,mo=calMonth;
  document.getElementById('cal-ym').textContent=`${yr}.${p(mo+1)}`;
  const has=new Set(logs.map(l=>l.date));
  let h=['日','月','火','水','木','金','土'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const first=new Date(yr,mo,1).getDay();
  const days=new Date(yr,mo+1,0).getDate();
  for(let i=0;i<first;i++)h+=`<div class="cal-day other"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${yr}-${p(mo+1)}-${p(d)}`;
    let c='cal-day';
    if(has.has(ds))c+=' has';
    if(ds===todayStr)c+=' today';
    if(ds===selectedDate)c+=' sel';
    h+=`<div class="${c}" onclick="guardDirty(()=>selectDay('${ds}'))">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=h;
}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCal()}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++}renderCal()}

function selectDay(ds){
  selectedDate=ds;rOffset=0;
  renderCal();updateHeading();loadEntry(ds);
  document.getElementById('ai-box').style.display='none';
  renderRight();renderInfo(ds);
  switchView('write');
}
function updateHeading(){
  const[y,m,d]=selectedDate.split('-');
  const dow=dowStr(selectedDate);
  document.getElementById('write-heading-main').textContent=`${y}年${+m}月${+d}日（${dow}）`;
  const era=getEra(selectedDate);
  document.getElementById('write-heading-sub').textContent=era;
}
function loadEntry(ds){
  const l=logs.find(l=>l.date===ds);
  document.getElementById('entry-text').value=l?l.text:'';
  updateCC();setDirty(false);
}
function updateCC(){
  document.getElementById('char-count').textContent=`${document.getElementById('entry-text').value.length.toLocaleString()} 文字`;
}

// ─── VIEW SWITCH ─────────────────────────
function requestView(name){
  if(name!=='write'&&isDirty){
    guardDirty(()=>switchView(name));
  }else{
    switchView(name);
  }
}
function switchView(name){
  document.querySelectorAll('.htab').forEach((t,i)=>t.classList.toggle('active',['write','list','stats'][i]===name));
  document.getElementById('vwrite').style.display=name==='write'?'flex':'none';
  document.getElementById('vlist').style.display=name==='list'?'flex':'none';
  document.getElementById('vstats').style.display=name==='stats'?'flex':'none';
  if(name==='list')renderList();
  if(name==='stats'){renderStats();populateExport()}
}

// ─── SAVE ────────────────────────────────
function saveEntry(){
  const text=document.getElementById('entry-text').value.trim();
  if(!text){alert('内容を入力してください。');return}
  _doSave();
  renderCal();renderStats();renderRight();populateExport();
  switchView('list');
}
function _doSave(){
  const text=document.getElementById('entry-text').value.trim();
  if(!text)return;
  const ai=document.getElementById('ai-text').innerText||null;
  const idx=logs.findIndex(l=>l.date===selectedDate);
  const entry={date:selectedDate,text,ai,saved:new Date().toISOString()};
  if(idx>=0)logs[idx]=entry;else logs.unshift(entry);
  logs.sort((a,b)=>b.date.localeCompare(a.date));
  localStorage.setItem('nippo_v4',JSON.stringify(logs));
  setDirty(false);
  document.getElementById('ai-box').style.display='none';
}

// ─── RIGHT PREVIEW ───────────────────────
function shiftOffset(d){rOffset+=d;renderRight()}
function renderRight(){
  const lbl=rOffset===0?'前日 ／ 翌日':`${diffLabel(rOffset-1)} ／ ${diffLabel(rOffset+1)}`;
  document.getElementById('rnav-label').textContent=lbl;
  renderSlot('rslot0',addDays(selectedDate,rOffset-1),rOffset-1);
  renderSlot('rslot1',addDays(selectedDate,rOffset+1),rOffset+1);
}
function renderSlot(id,ds,diff){
  const slot=document.getElementById(id);
  const log=logs.find(l=>l.date===ds);
  slot.innerHTML='';
  const dateDiv=document.createElement('div');
  dateDiv.className='rslot-date';
  dateDiv.textContent=`${ds}（${dowStr(ds)}）— ${diffLabel(diff)}`;
  slot.appendChild(dateDiv);
  const body=document.createElement('div');
  body.className='rslot-body'+(log?'':' empty');
  if(log){
    body.innerHTML=esc(log.text).replace(URL_RE,u=>`<a href="${u}" target="_blank" rel="noopener">${esc(u)}</a>`);
  }else{
    body.textContent='（記録なし）';
  }
  slot.appendChild(body);
  if(log){
    const ed=document.createElement('div');ed.className='rslot-edit';
    const btn=document.createElement('button');
    btn.textContent='この日を編集 →';
    btn.onclick=()=>guardDirty(()=>selectDay(ds));
    ed.appendChild(btn);slot.appendChild(ed);
  }
}

// ─── INFO PANE ───────────────────────────
const ROKUYO=['大安','赤口','先勝','友引','先負','仏滅'];
const SEKKI=[
  [1,6,'小寒'],[1,20,'大寒'],[2,4,'立春'],[2,19,'雨水'],[3,6,'啓蟄'],[3,21,'春分'],
  [4,5,'清明'],[4,20,'穀雨'],[5,6,'立夏'],[5,21,'小満'],[6,6,'芒種'],[6,21,'夏至'],
  [7,7,'小暑'],[7,23,'大暑'],[8,7,'立秋'],[8,23,'処暑'],[9,8,'白露'],[9,23,'秋分'],
  [10,8,'寒露'],[10,23,'霜降'],[11,7,'立冬'],[11,22,'小雪'],[12,7,'大雪'],[12,22,'冬至']
];
const ERAS=[{y:2019,m:5,d:1,name:'令和'},{y:1989,m:1,d:8,name:'平成'},{y:1926,m:12,d:25,name:'昭和'}];
const KINEN_DAYS={
  '1-1':'元日','2-3':'節分（目安）','2-11':'建国記念の日','2-14':'バレンタインデー',
  '3-3':'ひな祭り','3-14':'ホワイトデー','3-20':'春分の日（目安）','4-1':'エイプリルフール',
  '4-29':'昭和の日','5-3':'憲法記念日','5-4':'みどりの日','5-5':'こどもの日',
  '6-1':'衣替え','7-7':'七夕','7-20':'海の日（目安）','8-11':'山の日','8-15':'終戦記念日',
  '9-15':'敬老の日（目安）','9-23':'秋分の日（目安）','10-31':'ハロウィン',
  '11-3':'文化の日','11-15':'七五三','11-23':'勤労感謝の日',
  '12-24':'クリスマスイブ','12-25':'クリスマス','12-31':'大晦日'
};

function getRokuyo(ds){
  const[y,m,d]=ds.split('-').map(Number);
  // 旧暦計算（簡易：天保暦近似）
  const jd=Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m<=2?m+13:m+1))+(m<=2?y-1:y)+d-1524.5;
  const lm=Math.floor((jd-1721425.5-29.53059)/29.53059);
  const lmStart=1721425.5+29.53059*(lm+0.5);
  const ld=Math.floor(jd-lmStart)+1;
  return ROKUYO[(((m<=2?m+12:m)+ld-1)%6+6)%6];
}

function getSekki(ds){
  const[y,m,d]=ds.split('-').map(Number);
  for(const[sm,sd,name]of SEKKI){if(sm===m&&sd===d)return name}
  return null;
}

function getEra(ds){
  const[y,m,d]=ds.split('-').map(Number);
  for(const e of ERAS){
    if(y>e.y||(y===e.y&&(m>e.m||(m===e.m&&d>=e.d)))){
      let ey=y-e.y+1;
      return`${e.name}${ey===1?'元':ey}年`;
    }
  }
  return`${y}年`;
}

function renderInfo(ds){
  const[y,m,d]=ds.split('-').map(Number);
  document.getElementById('info-date-lbl').textContent=`${ds}（${dowStr(ds)}）`;
  const rk=getRokuyo(ds);
  const sk=getSekki(ds);
  const era=getEra(ds);
  const kinen=KINEN_DAYS[`${m}-${d}`]||null;
  const grid=document.getElementById('koyomi-grid');
  const items=[
    ['元号',era,true],
    ['六曜',rk,true],
    ['節気',sk||'—',false],
    ...(kinen?[['記念日',kinen,false]]:[])
  ];
  grid.innerHTML=items.map(([k,v,big])=>`
    <div class="koyomi-item">
      <div class="koyomi-key">${k}</div>
      <div class="koyomi-val${big?' big':''}">${v}</div>
    </div>`).join('');
}


// ─── URL / OG ────────────────────────────
const URL_RE=/https?:\/\/[^\s\u3000\u300c\u300d\uff08\uff09\u3001\u3002\uff0c\uff0e"'<>()\[\]]+/g;
const ogCache={};
async function fetchOG(url){
  if(ogCache[url]!==undefined)return ogCache[url];
  ogCache[url]=null;
  try{
    const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
    const data=await r.json();
    const doc=new DOMParser().parseFromString(data.contents,'text/html');
    const g=n=>doc.querySelector(`meta[property="${n}"]`)?.content||doc.querySelector(`meta[name="${n}"]`)?.content||'';
    ogCache[url]={title:g('og:title')||doc.title||'',desc:g('og:description')||g('description')||'',img:g('og:image')||'',domain:new URL(url).hostname.replace('www.','')};
  }catch(e){}
  return ogCache[url];
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function renderLinks(text,container,cards){
  const urls=[...new Set(text.match(URL_RE)||[])];
  container.innerHTML=esc(text).replace(URL_RE,u=>`<a href="${u}" target="_blank" rel="noopener">${esc(u)}</a>`);
  if(!cards||!urls.length)return;
  urls.forEach(async url=>{
    const og=await fetchOG(url);if(!og||!og.title)return;
    if(container.querySelector(`[data-og="${CSS.escape(url)}"]`))return;
    const card=document.createElement('div');card.className='url-card';card.setAttribute('data-og',url);
    card.onclick=()=>window.open(url,'_blank');
    card.innerHTML=`${og.img?`<img class="url-card-thumb" src="${esc(og.img)}" onerror="this.style.display='none'" loading="lazy">`:''}
    <div class="url-card-info"><div class="url-card-title">${esc(og.title)}</div>${og.desc?`<div class="url-card-desc">${esc(og.desc)}</div>`:''}<div class="url-card-domain">${esc(og.domain)}</div></div>`;
    container.querySelectorAll('a').forEach(a=>{if(a.href===url||a.textContent===url)a.after(card)});
  });
}

// ─── LIST ────────────────────────────────
function renderList(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const f=logs.filter(l=>!q||l.text.toLowerCase().includes(q));
  const el=document.getElementById('log-list');
  if(!f.length){el.innerHTML='<div class="empty">— NO ENTRIES —</div>';return}
  el.innerHTML='';
  f.forEach(l=>{
    const item=document.createElement('div');item.className='log-item';
    const badge=document.createElement('div');badge.className='log-date-badge';
    badge.textContent=`${l.date}（${dowStr(l.date)}）`;item.appendChild(badge);
    const body=document.createElement('div');body.className='log-body';item.appendChild(body);
    const SHORT=140,isLong=l.text.length>SHORT,exp={v:false};
    function show(full){renderLinks(full?l.text:(isLong?l.text.slice(0,SHORT)+'…':l.text),body,full)}
    show(false);
    if(isLong){
      const btn=document.createElement('button');btn.className='expand-btn';btn.textContent='続きを読む ↓';
      btn.onclick=()=>{exp.v=!exp.v;show(exp.v);btn.textContent=exp.v?'折りたたむ ↑':'続きを読む ↓';item.appendChild(btn)};
      item.appendChild(btn);
    }
    el.appendChild(item);
  });
  if(q){
    el.querySelectorAll('.log-body').forEach(b=>{
      b.innerHTML=b.innerHTML.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<mark class="highlight">$1</mark>');
    });
  }
}

// ─── STATS ───────────────────────────────
function renderStats(){
  document.getElementById('stat-total').textContent=logs.length;
  const ym=todayStr.slice(0,7);
  document.getElementById('stat-month').textContent=logs.filter(l=>l.date.startsWith(ym)).length;
  let st=0;
  for(let i=0;i<365;i++){const d=new Date(_today);d.setDate(d.getDate()-i);if(logs.some(l=>l.date===fmt(d)))st++;else break}
  document.getElementById('stat-streak').textContent=st;
}

// ─── AI ──────────────────────────────────
async function generateSummary(){
  const text=document.getElementById('entry-text').value.trim();
  if(!text){alert('内容を入力してください。');return}
  const box=document.getElementById('ai-box'),el=document.getElementById('ai-text');
  box.style.display='block';el.innerHTML='<span class="spinner"></span>要約を生成中…';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`社史・周年史専門フリーライターの業務日報です。以下を3〜5点の箇条書きで要約し、最後に一言振り返りコメントを添えてください。200字以内で。\n\n---\n${text}`}]})});
    const data=await r.json();
    el.innerText=data.content?.find(b=>b.type==='text')?.text||'取得できませんでした。';
  }catch(e){el.innerText='エラー: '+e.message}
}
async function generateWeeklyReview(){
  if(logs.length<3){alert('日報を3件以上記録してから実行してください。');return}
  const el=document.getElementById('stats-ai');
  el.innerHTML='<span class="spinner"></span>振り返りを生成中…';
  const recent=logs.slice(0,7).map(l=>`【${l.date}】\n${l.text}`).join('\n\n');
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`社史・周年史専門フリーライターの直近業務日報です。①よく取り組んだテーマ、②課題・停滞点、③来週のアクション提案、の3点で振り返りを300字以内で書いてください。\n\n---\n${recent}`}]})});
    const data=await r.json();
    el.innerText=data.content?.find(b=>b.type==='text')?.text||'取得できませんでした。';
  }catch(e){el.innerText='エラー: '+e.message}
}

// ─── EXPORT ──────────────────────────────
function populateExport(){
  if(!logs.length)return;
  const months=[...new Set(logs.map(l=>l.date.slice(0,7)))].sort().reverse();
  const years=[...new Set(months.map(m=>m.slice(0,4)))];
  const ys=document.getElementById('export-year'),cy=ys.value;
  ys.innerHTML=years.map(y=>`<option value="${y}"${y===cy?'selected':''}>${y}年</option>`).join('');
  ys.onchange=updateMonthSel;updateMonthSel();
}
function updateMonthSel(){
  const y=document.getElementById('export-year').value;
  const ms=[...new Set(logs.filter(l=>l.date.startsWith(y)).map(l=>l.date.slice(5,7)))].sort().reverse();
  const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('export-month').innerHTML=ms.map(m=>`<option value="${m}">${mn[+m-1]}</option>`).join('');
}
function exportMarkdown(){
  const y=document.getElementById('export-year').value,m=document.getElementById('export-month').value;
  if(!y||!m){alert('年月を選択してください。');return}
  const t=logs.filter(l=>l.date.startsWith(`${y}-${m}`)).sort((a,b)=>a.date.localeCompare(b.date));
  if(!t.length){alert('該当する日報がありません。');return}
  let md=`# ${y}年${+m}月 業務日報\n\nエクスポート: ${new Date().toLocaleString('ja-JP')}\n\n---\n\n`;
  t.forEach(l=>{
    md+=`## ${l.date}（${dowStr(l.date)}）\n\n${l.text}\n\n`;
    if(l.ai){md+=`> **AI要約**\n>\n`;l.ai.split('\n').forEach(line=>{md+=`> ${line}\n`});md+='\n'}
    md+=`---\n\n`;
  });
  const blob=new Blob([md],{type:'text/markdown;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`nippo_${y}${m}.md`;a.click();
  URL.revokeObjectURL(a.href);
}
